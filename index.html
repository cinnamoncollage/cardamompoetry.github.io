<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cardamompoetry | Overgrown Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Montserrat:wght@200;400&family=Playfair+Display:ital,wght@1,400;1,900&display=swap');

        :root {
            --midnight: #0d0e10;
            --thistle: #2d242b;
            --spice: #8c5a44;
            --text-main: #c4c0b9;
        }

        body {
            background-color: var(--midnight);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
        }

        .serif-title { font-family: 'Cormorant Garamond', serif; }
        .poetry-italic { font-family: 'Playfair Display', serif; font-style: italic; }

        /* Textures */
        .film-grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/dust.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: 50;
        }

        .botanical-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(45, 36, 43, 0.4) 0%, rgba(13, 14, 16, 1) 100%);
            z-index: -1;
        }

        /* Framework containers */
        .specimen-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2.5rem;
        }

        .empty-state {
            grid-column: span 12;
            text-align: center;
            padding: 100px 0;
            border: 1px dashed rgba(161, 157, 148, 0.2);
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="film-grain"></div>
    <div class="botanical-bg"></div>

    <nav class="relative z-[100] px-10 py-12 flex justify-between items-center max-w-7xl mx-auto">
        <div class="serif-title text-4xl tracking-tighter italic text-stone-200">cardamompoetry</div>
        <div class="flex space-x-12 text-[9px] uppercase tracking-[0.4em] font-light">
            <a href="#" class="hover:text-[var(--spice)] transition-colors">Archive</a>
            <a href="#" class="hover:text-[var(--spice)] transition-colors">Links</a>
        </div>
    </nav>

    <header class="relative z-50 max-w-5xl mx-auto px-10 py-24">
        <h1 class="serif-title text-5xl md:text-7xl leading-tight mb-10">
            Notes on the <span class="poetry-italic opacity-60">unspoken</span>,<br/>
            the <span class="poetry-italic opacity-60">unwritten</span>, and the <br/>
            <span class="text-[var(--spice)]">undercurrents</span>.
        </h1>
    </header>

    <main class="relative z-50 max-w-7xl mx-auto px-10 pb-40">
        <div class="specimen-grid">
            <div class="empty-state">
                The vault is currently silent. <br> Fragments arriving soon.
            </div>
        </div>
    </main>

    <footer class="relative z-50 py-32 border-t border-stone-800/40 px-10">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start gap-12">
            <div>
                <div class="serif-title text-3xl italic mb-4">Linked to the elsewhere.</div>
                <p class="text-[10px] uppercase tracking-widest opacity-30">Rooted in AO3 & Wattpad.</p>
            </div>
        </div>
    </footer>

</body>
</html>
